<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LogginSuite</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; color: #f8fafc; font-family: system-ui; padding-bottom: 70px; }
    .container { max-width: 480px; margin: 0 auto; padding: 20px; }

    header { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-circle { width: 42px; height: 42px; background: #3b82f6; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; }
    .logo-text { font-size: 22px; font-weight: 700; }
    .menu-btn { width: 42px; height: 42px; background: #1e2937; border: none; border-radius: 10px; color: white; font-size: 24px; cursor: pointer; }

    h1 { font-size: 32px; font-weight: 800; text-align: center; margin: 40px 0 15px; }
    .subtitle { text-align: center; color: #94a3b8; margin-bottom: 40px; }

    .search-container { display: flex; gap: 10px; margin-bottom: 30px; }
    .search-input { flex: 1; background: #1e2937; border: 1px solid #334155; border-radius: 9999px; padding: 14px 20px; color: white; }
    .search-btn { background: #6366f1; color: white; border: none; border-radius: 9999px; padding: 14px 28px; font-weight: 600; }

    .trending-label { text-align: center; color: #64748b; font-size: 14px; margin-bottom: 12px; }
    .trending { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 35px; }
    .pill { background: #1e2937; color: #e2e8f0; padding: 8px 18px; border-radius: 9999px; font-size: 14px; cursor: pointer; border: 1px solid #334155; }

    .actions { display: flex; gap: 12px; margin-bottom: 50px; }
    .btn-primary { flex: 1; background: #6366f1; color: white; border: none; padding: 16px; border-radius: 9999px; font-weight: 700; }
    .btn-secondary { flex: 1; background: transparent; color: #e2e8f0; border: 1px solid #475569; padding: 16px; border-radius: 9999px; font-weight: 600; }

    .explore-section { margin-bottom: 50px; }
    .explore-title { font-size: 26px; font-weight: 800; text-align: center; margin-bottom: 10px; }
    .explore-subtitle { text-align: center; color: #94a3b8; font-size: 15px; margin-bottom: 30px; }
    .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .market-card { background: #1e2937; border-radius: 20px; padding: 22px 18px; text-align: center; cursor: pointer; }
    .market-icon { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 26px; }
    .market-card h3 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
    .market-card p { font-size: 13px; color: #64748b; }

    .cta-banner { background: #4c1d95; border-radius: 24px; padding: 35px 25px; text-align: center; margin-bottom: 50px; }
    .cta-banner h2 { font-size: 24px; font-weight: 800; margin-bottom: 15px; }
    .cta-banner p { color: #c4b5fd; font-size: 15px; margin-bottom: 25px; }
    .cta-btn { background: #1e2937; color: white; border: none; padding: 14px 40px; border-radius: 9999px; font-weight: 700; }

    /* Auth Pages */
    .auth-page { 
      max-width: 420px; margin: 40px auto; background: white; color: #1e2937; 
      border-radius: 20px; padding: 30px 25px; display: none; position: relative;
    }
    .auth-page h2 { color: #1e40af; font-size: 32px; text-align: center; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 600; }
    .form-group input { width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 16px; }
    .auth-btn { width: 100%; background: #1e40af; color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 700; margin-top: 10px; }

    .close-auth{
      position:absolute; top:18px; right:18px; width:38px; height:38px;
      border:none; border-radius:10px; background:#e5e7eb; color:#111827;
      font-size:22px; font-weight:bold; cursor:pointer;
    }

    /* Dashboard */
    .dashboard { display: none; }
    .welcome { font-size: 17px; margin-bottom: 20px; color: #e2e8f0; }

    .balance-card, .rent-card, .social-card, .service-card, .all-caught-up {
      border-radius: 20px; padding: 20px; margin-bottom: 20px;
    }
    .balance-card { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
    .rent-card { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }

    .spinner { 
      width: 50px; height: 50px; 
      border: 5px solid #334155; 
      border-top: 5px solid #6366f1; 
      border-radius: 50%; 
      animation: spin 1s linear infinite; 
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loadingOverlay { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(15,23,42,0.9); 
      display: none; justify-content: center; align-items: center; 
      z-index: 300; flex-direction: column; color: white;
    }

    /* Bottom nav + other styles (kept the rest of your styles) */
    .bottom-nav{
      position:fixed; bottom:0; left:0; width:100%; height:70px;
      background:#07111f; display:flex; justify-content:space-around;
      align-items:center; border-top:1px solid rgba(255,255,255,.08); z-index:999999;
    }
    .nav-btn{
      width:20%; height:100%; display:flex; justify-content:center; align-items:center;
      text-decoration:none; color:#6f7a8a; font-size:24px; transition:.25s;
    }
    .nav-btn.active { color:#2f8cff; }
    .side-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; z-index: 200; display: none; flex-direction: column; }
    .side-menu.active { display: flex; }
    /* ... (your other styles remain the same) */
  </style>
</head>
<body>

  <!-- HOME PAGE -->
  <div id="homePage" class="container">
    <!-- ... your home content (unchanged) ... -->
  </div>

  <!-- AUTH PAGES (login, register, forgot) - unchanged except close button positioning -->
  <!-- LOGIN PAGE -->
  <div id="loginPage" class="auth-page">
    <button class="close-auth" onclick="showPage('homePage')">✕</button>
    <h2>Login</h2>
    <!-- rest of login form unchanged -->
  </div>

  <!-- REGISTER + FORGOT pages unchanged -->

  <!-- DASHBOARD -->
  <div id="dashboardPage" class="container dashboard">
    <header>
      <div class="logo">
        <div class="logo-circle">L</div>
        <span class="logo-text">LogginSuite</span>
      </div>
      <button class="logout-btn" onclick="logoutUser()">Logout</button>
    </header>

    <div class="welcome" id="welcomeText">Welcome back!</div>

    <!-- Balance, Stats, Rent, Social, Service Grid, All Caught Up sections -->
    <!-- (I fixed the missing closing tags here) -->

    <div class="balance-card"> ... </div>
    <div class="stats-row"> ... </div>
    <div class="rent-card"> ... </div>
    <div class="social-card"> ... </div>

    <div class="service-grid"> ... </div>

    <div class="all-caught-up">
      <div class="bell">🔔</div>
      <h3>All caught up!</h3>
      <p>No recent activity to show</p>
    </div>

    <nav class="bottom-nav">
      <!-- your bottom nav -->
    </nav>
  </div>

  <!-- Wallet Page -->
  <div id="walletPage" class="container" style="display:none;">
    <!-- your wallet content -->
  </div>

  <!-- Services Page -->
  <div id="servicesPage" class="container" style="display:none;">
    <!-- your services content -->
  </div>

  <!-- Side Menu -->
  <div id="sideMenu" class="side-menu"> ... </div>

  <!-- LOADING OVERLAY -->
  <div id="loadingOverlay">
    <div class="spinner"></div>
    <p>Please wait...</p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script>
    // Firebase config (unchanged)
    const firebaseConfig = { /* ... */ };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const googleProvider = new firebase.auth.GoogleAuthProvider();

    // Improved loading function
    function showLoadingThen(callback) {
      const overlay = document.getElementById('loadingOverlay');
      overlay.style.display = 'flex';
      
      setTimeout(() => {
        overlay.style.display = 'none';
        if (typeof callback === 'function') callback();
      }, 1200); // slightly faster feel
    }

    // Rest of your functions (googleLogin, showPage, etc.) stay the same
    // ... (keep all your existing functions)

    // Fixed duplicate showDashboard
    function showDashboard() {
      document.getElementById("dashboardPage").style.display = "block";
      document.getElementById("walletPage").style.display = "none";
      document.getElementById("servicesPage").style.display = "none";
    }

    function showWallet() {
      document.getElementById("dashboardPage").style.display = "none";
      document.getElementById("walletPage").style.display = "block";
    }

    // ... rest of your script
  </script>
</body>
</html>
